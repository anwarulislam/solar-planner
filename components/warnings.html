          <!-- ── WARNINGS PANEL ── -->
          <div
            class="warnings-panel"
            x-show="res.totalPeak === 0 || hasSurgingLoads() || systemType === 'pwm' || systemType === 'hybrid'"
            x-transition
          >
            <!-- No load warning -->
            <div class="warn-item warn-info" x-show="res.totalPeak === 0">
              <i class="fas fa-circle-info"></i>
              <span x-text="t('warnNoLoad')"></span>
            </div>
            <!-- Motor surge warning -->
            <div class="warn-item warn-caution" x-show="hasSurgingLoads()">
              <i class="fas fa-triangle-exclamation"></i>
              <div>
                <strong x-text="t('warnSurge')"></strong>
                <span x-text="t('warnSurgeNote')"></span>
              </div>
            </div>
            <!-- PWM info -->
            <div class="warn-item warn-info" x-show="systemType === 'pwm'">
              <i class="fas fa-microchip"></i>
              <span x-text="t('warnPWM')"></span>
            </div>
            <!-- Hybrid Inverter info -->
            <div class="warn-item warn-info" x-show="systemType === 'hybrid'">
              <i class="fas fa-layer-group"></i>
              <span x-text="t('warnHybridInverter')"></span>
            </div>
          </div>
