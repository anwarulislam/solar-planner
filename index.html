<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar Setup Calculator</title>
    <meta
      name="description"
      content="Plan your perfect solar power system. Get instant calculations for inverter size, battery storage, and solar array requirements with real-time cost estimates."
    />

    <!-- SEO and Meta Tags -->
    <meta
      name="keywords"
      content="solar, calculator, solar setup, inverter size, battery storage, solar array, grid-tied, off-grid, cost estimate"
    />
    <meta name="author" content="Solar Setup Calculator" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1e293b" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Solar Setup Calculator" />
    <meta
      property="og:description"
      content="Plan your perfect solar power system. Get instant calculations for inverter size, battery storage, and solar array requirements with real-time cost estimates."
    />
    <!-- Replace with your actual domain and image URL when deploying -->
    <meta property="og:url" content="https://solar.anwar.bd/" />
    <meta property="og:image" content="https://solar.anwar.bd/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Solar Setup Calculator" />
    <meta
      name="twitter:description"
      content="Plan your perfect solar power system. Get instant calculations for inverter size, battery storage, and solar array requirements with real-time cost estimates."
    />
    <meta name="twitter:image" content="https://solar.anwar.bd/og-image.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="favicon.svg" />

    <!-- Alpine.js -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <!-- FontAwesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- html2canvas — DOM to canvas for share image -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  </head>

  <body
    x-data="solarCalculator()"
    x-init="init()"
    :class="darkMode ? '' : 'light'"
  >
    <div class="page-wrap">
      <!-- ── HEADER ── -->
      <header class="header">
        <div class="header-top">
          <div class="header-badge">
            <i class="fas fa-solar-panel"></i>
            <span x-text="t('badge')"></span>
          </div>
          <button
            class="theme-toggle"
            @click="toggleLang()"
            :title="lang === 'en' ? 'বাংলায় দেখুন' : 'Switch to English'"
            style="
              font-size: 11px;
              font-weight: 700;
              width: 38px;
              font-family: inherit;
            "
            x-text="lang === 'en' ? 'বাং' : 'EN'"
          ></button>
          <button
            class="theme-toggle"
            @click="toggleDark()"
            :title="darkMode ? 'Switch to light mode' : 'Switch to dark mode'"
          >
            <i class="fas" :class="darkMode ? 'fa-sun' : 'fa-moon'"></i>
          </button>
        </div>
        <h1 x-text="t('title')"></h1>
      </header>

      <div class="main-grid">
        <!-- ──────────────── LEFT COLUMN ──────────────── -->
        <div class="left-col">
          <div
            hx-get="components/appliances.html"
            hx-trigger="load"
            hx-swap="outerHTML"
          ></div>
          <div
            hx-get="components/preferences.html"
            hx-trigger="load"
            hx-swap="outerHTML"
          ></div>
          <div
            hx-get="components/load-breakdown.html"
            hx-trigger="load"
            hx-swap="outerHTML"
          ></div>
          <div
            hx-get="components/compare.html"
            hx-trigger="load"
            hx-swap="outerHTML"
          ></div>
          <div
            hx-get="components/quick-info.html"
            hx-trigger="load"
            hx-swap="outerHTML"
          ></div>
        </div>
        <!-- ─── END LEFT ─── -->

        <!-- ──────────────── RIGHT COLUMN ──────────────── -->
        <div class="right-col">
          <div
            hx-get="components/results.html"
            hx-trigger="load"
            hx-swap="outerHTML"
          ></div>
          <div
            hx-get="components/warnings.html"
            hx-trigger="load"
            hx-swap="outerHTML"
          ></div>
        </div>
        <!-- ─── END RIGHT ─── -->
      </div>
    </div>

    <div
      hx-get="components/footer.html"
      hx-trigger="load"
      hx-swap="outerHTML"
    ></div>
    <div
      hx-get="components/save-modal.html"
      hx-trigger="load"
      hx-swap="outerHTML"
    ></div>
    <div
      hx-get="components/load-modal.html"
      hx-trigger="load"
      hx-swap="outerHTML"
    ></div>
    <div
      hx-get="components/share-card.html"
      hx-trigger="load"
      hx-swap="outerHTML"
    ></div>
    <script src="constants.js"></script>
    <script src="i18n.js"></script>
    <script src="script.js"></script>
  </body>
</html>
