<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar Setup Calculator</title>
    <meta
      name="description"
      content="Plan your perfect solar power system. Get instant calculations for inverter size, battery storage, and solar array requirements with real-time cost estimates."
    />

    <!-- Alpine.js -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <!-- FontAwesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body
    x-data="solarCalculator()"
    x-init="init()"
    :class="darkMode ? '' : 'light'"
  >
    <div class="page-wrap">
      <!-- ── HEADER ── -->
      <header class="header">
        <div class="header-top">
          <div class="header-badge">
            <i class="fas fa-solar-panel"></i>
            <span x-text="t('badge')"></span>
          </div>
          <button
            class="theme-toggle"
            @click="toggleLang()"
            :title="lang === 'en' ? 'বাংলায় দেখুন' : 'Switch to English'"
            style="
              font-size: 11px;
              font-weight: 700;
              width: 38px;
              font-family: inherit;
            "
            x-text="lang === 'en' ? 'বাং' : 'EN'"
          ></button>
          <button
            class="theme-toggle"
            @click="toggleDark()"
            :title="darkMode ? 'Switch to light mode' : 'Switch to dark mode'"
          >
            <i class="fas" :class="darkMode ? 'fa-sun' : 'fa-moon'"></i>
          </button>
        </div>
        <h1 x-text="t('title')"></h1>
      </header>

      <div class="main-grid">
        <!-- ──────────────── LEFT COLUMN ──────────────── -->
        <div class="left-col">
          <!-- Appliances Section -->
          <div class="card">
            <div class="section-head">
              <div class="section-title">
                <div class="section-icon icon-blue">
                  <i class="fas fa-plug"></i>
                </div>
                <div>
                  <h2 x-text="t('appliancesTitle')"></h2>
                  <p x-text="t('appliancesDesc')"></p>
                </div>
              </div>
            </div>

            <div class="appliances-list">
              <template x-for="app in commonAppliances" :key="app.id">
                <div class="appliance-row">
                  <div class="app-info">
                    <div class="app-icon-wrap" :class="app.iconColor">
                      <i class="fas" :class="app.icon"></i>
                    </div>
                    <div>
                      <div class="app-name" x-text="appName(app)"></div>
                      <div class="app-watts">
                        <span x-text="app.watts"></span
                        ><span x-text="' ' + t('wPerUnit')"></span>
                        <!-- total watts inline -->
                        <span
                          class="app-total-badge"
                          x-show="state[app.id].qty > 0"
                          x-text="'· ' + appTotalWatts(app) + 'W ' + t('totalWatts')"
                        ></span>
                      </div>
                    </div>
                  </div>
                  <div class="app-controls">
                    <div>
                      <div class="ctrl-label" x-text="t('qty')"></div>
                      <div class="qty-stepper">
                        <button class="qty-btn" @click="updateQty(app.id, -1)">
                          −
                        </button>
                        <span class="qty-val" x-text="state[app.id].qty"></span>
                        <button class="qty-btn" @click="updateQty(app.id, 1)">
                          +
                        </button>
                      </div>
                    </div>
                    <div>
                      <div class="ctrl-label" x-text="t('hoursPerDay')"></div>
                      <div class="hours-ctrl">
                        <input
                          type="range"
                          min="0"
                          max="24"
                          step="0.5"
                          x-model.number="state[app.id].hours"
                          @input="calculate()"
                          class="slider-sm"
                        />
                        <span
                          class="hours-val"
                          x-text="state[app.id].hours + 'h'"
                        ></span>
                      </div>
                    </div>
                  </div>
                </div>
              </template>
            </div>

            <!-- Other Appliances (toggle) -->
            <div x-show="isOtherVisible" x-transition>
              <div class="divider-label">
                <span x-text="t('otherAppliances')"></span>
              </div>
              <div class="appliances-list">
                <template x-for="app in otherAppliances" :key="app.id">
                  <div class="appliance-row">
                    <div class="app-info">
                      <div class="app-icon-wrap" :class="app.iconColor">
                        <i class="fas" :class="app.icon"></i>
                      </div>
                      <div>
                        <div class="app-name" x-text="appName(app)"></div>
                        <div class="app-watts">
                          <span x-text="app.watts"></span
                          ><span x-text="' ' + t('wPerUnit')"></span>
                          <span
                            class="app-total-badge"
                            x-show="state[app.id].qty > 0"
                            x-text="'· ' + appTotalWatts(app) + 'W ' + t('totalWatts')"
                          ></span>
                        </div>
                      </div>
                    </div>
                    <div class="app-controls">
                      <div>
                        <div class="ctrl-label" x-text="t('qty')"></div>
                        <div class="qty-stepper">
                          <button
                            class="qty-btn"
                            @click="updateQty(app.id, -1)"
                          >
                            −
                          </button>
                          <span
                            class="qty-val"
                            x-text="state[app.id].qty"
                          ></span>
                          <button class="qty-btn" @click="updateQty(app.id, 1)">
                            +
                          </button>
                        </div>
                      </div>
                      <div>
                        <div class="ctrl-label" x-text="t('hoursPerDay')"></div>
                        <div class="hours-ctrl">
                          <input
                            type="range"
                            min="0"
                            max="24"
                            step="0.5"
                            x-model.number="state[app.id].hours"
                            @input="calculate()"
                            class="slider-sm"
                          />
                          <span
                            class="hours-val"
                            x-text="state[app.id].hours + 'h'"
                          ></span>
                        </div>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <button
              class="toggle-btn"
              @click="isOtherVisible = !isOtherVisible"
            >
              <i
                class="fas text-xs"
                :class="isOtherVisible ? 'fa-chevron-up' : 'fa-chevron-down'"
              ></i>
              <span
                x-text="isOtherVisible ? t('hideOther') : t('showOther')"
              ></span>
            </button>
          </div>

          <!-- System Preferences -->
          <div class="card">
            <div class="section-head">
              <div class="section-title">
                <div class="section-icon icon-amber">
                  <i class="fas fa-sliders-h"></i>
                </div>
                <div>
                  <h2 x-text="t('prefsTitle')"></h2>
                  <p x-text="t('prefsDesc')"></p>
                </div>
              </div>
            </div>

            <div class="prefs-grid">
              <!-- Backup Duration -->
              <div class="pref-item">
                <label>
                  <span x-text="t('backupDuration')"></span>
                  <span
                    class="pref-val"
                    style="color: var(--accent)"
                    x-text="autonomy + 'h'"
                  ></span>
                </label>
                <input
                  type="range"
                  min="1"
                  max="72"
                  step="1"
                  x-model.number="autonomy"
                  @input="calculate()"
                  class="slider-full"
                />
                <p class="pref-hint" x-text="t('backupHint')"></p>
              </div>

              <!-- Peak Sun Hours -->
              <div class="pref-item">
                <label>
                  <span x-text="t('peakSunHours')"></span>
                  <span
                    class="pref-val"
                    style="color: var(--amber)"
                    x-text="sun + 'h'"
                  ></span>
                </label>
                <input
                  type="range"
                  min="2"
                  max="7"
                  step="0.1"
                  x-model.number="sun"
                  @input="calculate()"
                  class="slider-full amber-track"
                />
                <p class="pref-hint" x-text="t('peakSunHint')"></p>
              </div>

              <!-- System Efficiency -->
              <div class="pref-item">
                <label>
                  <span x-text="t('sysEfficiency')"></span>
                  <span
                    class="pref-val"
                    style="color: var(--green)"
                    x-text="sysEfficiency + '%'"
                  ></span>
                </label>
                <input
                  type="range"
                  min="60"
                  max="95"
                  step="1"
                  x-model.number="sysEfficiency"
                  @input="calculate()"
                  class="slider-full green-track"
                />
                <p class="pref-hint" x-text="t('sysEfficiencyHint')"></p>
              </div>

              <!-- Panel Size -->
              <div class="pref-item">
                <label style="margin-bottom: 12px">
                  <span x-text="t('panelWatts')"></span>
                  <span
                    class="pref-val"
                    style="color: var(--orange)"
                    x-text="panelWatts + 'W'"
                  ></span>
                </label>
                <div class="option-group">
                  <template x-for="pw in PANEL_SIZES" :key="pw">
                    <button
                      class="opt-btn"
                      :class="panelWatts === pw ? 'active-orange' : ''"
                      @click="panelWatts = pw; calculate()"
                      x-text="pw + 'W'"
                    ></button>
                  </template>
                </div>
                <p class="pref-hint" x-text="t('panelWattsHint')"></p>
              </div>

              <!-- Panel Type -->
              <div class="pref-item">
                <label style="margin-bottom: 12px">
                  <span x-text="t('panelType')"></span>
                  <span
                    class="pref-val"
                    style="color: var(--amber)"
                    x-text="rates.solarPerW + ' ৳/W'"
                  ></span>
                </label>
                <div class="option-group">
                  <button
                    class="opt-btn"
                    :class="panelType === 'mono' ? 'active-amber' : ''"
                    @click="panelType = 'mono'; calculate()"
                  >
                    <i class="fas fa-solar-panel" style="margin-right: 4px"></i>
                    <span x-text="t('panelStandard')"></span><br /><span
                      style="font-weight: 400; opacity: 0.7"
                      x-text="t('panelMono')"
                    ></span>
                  </button>
                  <button
                    class="opt-btn"
                    :class="panelType === 'poly' ? 'active-amber' : ''"
                    @click="panelType = 'poly'; calculate()"
                  >
                    <i class="fas fa-solar-panel" style="margin-right: 4px"></i>
                    <span x-text="t('panelPremium')"></span><br /><span
                      style="font-weight: 400; opacity: 0.7"
                      x-text="t('panelPoly')"
                    ></span>
                  </button>
                </div>
                <p class="pref-hint" x-text="t('panelHint')"></p>
              </div>

              <!-- Battery Type -->
              <div class="pref-item">
                <label style="margin-bottom: 12px">
                  <span x-text="t('batteryType')"></span>
                  <span
                    class="pref-val"
                    style="color: var(--purple)"
                    x-text="rates.battPerKwh.toLocaleString('en-IN') + ' ৳/kWh'"
                  ></span>
                </label>
                <div class="option-group">
                  <button
                    class="opt-btn"
                    :class="batteryType === 'lead-acid' ? 'active-orange' : ''"
                    @click="batteryType = 'lead-acid'; calculate()"
                  >
                    <i class="fas fa-car-battery" style="margin-right: 4px"></i>
                    <span x-text="t('leadAcid')"></span><br /><span
                      style="font-weight: 400; opacity: 0.7"
                      x-text="t('leadAcidSub')"
                    ></span>
                  </button>
                  <button
                    class="opt-btn"
                    :class="batteryType === 'lifepo4' ? 'active-orange' : ''"
                    @click="batteryType = 'lifepo4'; calculate()"
                  >
                    <i class="fas fa-bolt" style="margin-right: 4px"></i>
                    <span x-text="t('lifepo4')"></span><br /><span
                      style="font-weight: 400; opacity: 0.7"
                      x-text="t('lifepo4Sub')"
                    ></span>
                  </button>
                </div>
                <p class="pref-hint" x-text="t('batteryHint')"></p>
              </div>

              <!-- System Type -->
              <div class="pref-item">
                <label style="margin-bottom: 12px">
                  <span x-text="t('systemType')"></span>
                  <span
                    class="pref-val"
                    style="color: var(--green)"
                    x-text="systemTypeLabel()"
                  ></span>
                </label>
                <div class="option-group">
                  <button
                    class="opt-btn"
                    :class="systemType === 'off-grid' ? 'active-green' : ''"
                    @click="systemType = 'off-grid'; calculate()"
                    x-text="t('offGrid')"
                  ></button>
                  <button
                    class="opt-btn"
                    :class="systemType === 'hybrid' ? 'active-green' : ''"
                    @click="systemType = 'hybrid'; calculate()"
                    x-text="t('hybrid')"
                  ></button>
                  <button
                    class="opt-btn"
                    :class="systemType === 'grid-tied' ? 'active-green' : ''"
                    @click="systemType = 'grid-tied'; calculate()"
                    x-text="t('gridTied')"
                  ></button>
                </div>
                <p class="pref-hint" x-text="systemTypeHint()"></p>
              </div>

              <!-- Battery Voltage + Ah -->
              <div class="pref-item">
                <label style="margin-bottom: 12px">
                  <span x-text="t('batteryBank')"></span>
                  <span
                    class="pref-val"
                    style="color: var(--purple)"
                    x-text="voltage + 'V · ' + battAh + ' Ah · ' + battCapKwh().toFixed(2) + ' kWh'"
                  ></span>
                </label>
                <!-- Voltage buttons -->
                <div class="voltage-group">
                  <button
                    class="volt-btn"
                    :class="voltage === 12 ? 'active' : ''"
                    @click="setVoltage(12)"
                  >
                    12V
                  </button>
                  <button
                    class="volt-btn"
                    :class="voltage === 24 ? 'active' : ''"
                    @click="setVoltage(24)"
                  >
                    24V
                  </button>
                  <button
                    class="volt-btn"
                    :class="voltage === 48 ? 'active' : ''"
                    @click="setVoltage(48)"
                  >
                    48V
                  </button>
                </div>
                <!-- Ah chips for selected voltage -->
                <div class="ah-picker">
                  <template x-for="ah in availableBattAh()" :key="ah">
                    <button
                      class="ah-chip"
                      :class="battAh === ah ? 'active' : ''"
                      @click="battAh = ah; calculate()"
                      x-text="ah + ' Ah'"
                    ></button>
                  </template>
                </div>
                <p class="pref-hint" x-text="t('batteryBankHint')"></p>
              </div>
            </div>
          </div>

          <!-- ── LOAD BREAKDOWN ── -->
          <div
            class="card"
            x-show="parseFloat(res.dailyEnergy) > 0"
            x-transition
          >
            <div class="section-head">
              <div class="section-title">
                <div class="section-icon icon-blue">
                  <i class="fas fa-chart-bar"></i>
                </div>
                <div>
                  <h2 x-text="t('loadBreakdownTitle')"></h2>
                  <p x-text="t('loadBreakdownDesc')"></p>
                </div>
              </div>
            </div>
            <div class="load-chart">
              <template x-for="item in loadBreakdown()" :key="item.name">
                <div class="load-bar-row">
                  <div class="load-bar-label">
                    <span class="load-dot" :class="item.iconColor"></span>
                    <span x-text="item.name"></span>
                  </div>
                  <div class="load-bar-track">
                    <div
                      class="load-bar-fill"
                      :class="item.iconColor"
                      :style="'width:' + item.pct + '%'"
                    ></div>
                  </div>
                  <div class="load-bar-val">
                    <span x-text="item.kwh + ' kWh'"></span>
                    <span class="load-pct" x-text="item.pct + '%'"></span>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- ── COMPARE MODES ── -->
          <div class="card">
            <button
              class="toggle-btn"
              style="margin-top: 0"
              @click="isCompareVisible = !isCompareVisible; if(isCompareVisible) buildCompare()"
            >
              <i
                class="fas text-xs"
                :class="isCompareVisible ? 'fa-chevron-up' : 'fa-chart-pie'"
              ></i>
              <span
                x-text="isCompareVisible ? t('hideCompare') : t('showCompare')"
              ></span>
            </button>

            <div
              x-show="isCompareVisible"
              x-transition
              style="margin-top: 20px"
            >
              <div class="section-title" style="margin-bottom: 16px">
                <div class="section-icon icon-amber">
                  <i class="fas fa-balance-scale"></i>
                </div>
                <div>
                  <h2 x-text="t('compareTitle')"></h2>
                  <p x-text="t('compareDesc')"></p>
                </div>
              </div>
              <div class="compare-table">
                <!-- Header -->
                <div class="compare-header-row">
                  <div class="compare-cell compare-row-label"></div>
                  <template x-for="col in compareData" :key="col.mode">
                    <div
                      class="compare-cell compare-col-head"
                      :class="col.mode === systemType ? 'compare-active' : ''"
                      x-text="col.label"
                    ></div>
                  </template>
                </div>
                <!-- Inverter -->
                <div class="compare-row">
                  <div
                    class="compare-cell compare-row-label"
                    x-text="t('rowInverter')"
                  ></div>
                  <template x-for="col in compareData" :key="col.mode">
                    <div
                      class="compare-cell"
                      :class="col.mode === systemType ? 'compare-active' : ''"
                      x-text="col.inverter"
                    ></div>
                  </template>
                </div>
                <!-- Battery -->
                <div class="compare-row">
                  <div
                    class="compare-cell compare-row-label"
                    x-text="t('rowBattery')"
                  ></div>
                  <template x-for="col in compareData" :key="col.mode">
                    <div
                      class="compare-cell"
                      :class="col.mode === systemType ? 'compare-active' : ''"
                      x-text="col.battery"
                    ></div>
                  </template>
                </div>
                <!-- Solar -->
                <div class="compare-row">
                  <div
                    class="compare-cell compare-row-label"
                    x-text="t('rowSolar')"
                  ></div>
                  <template x-for="col in compareData" :key="col.mode">
                    <div
                      class="compare-cell"
                      :class="col.mode === systemType ? 'compare-active' : ''"
                      x-text="col.solar"
                    ></div>
                  </template>
                </div>
                <!-- Cost -->
                <div class="compare-row compare-cost-row">
                  <div
                    class="compare-cell compare-row-label"
                    x-text="t('rowCost')"
                  ></div>
                  <template x-for="col in compareData" :key="col.mode">
                    <div
                      class="compare-cell compare-cost-cell"
                      :class="col.mode === systemType ? 'compare-active' : ''"
                      x-text="col.cost"
                    ></div>
                  </template>
                </div>
              </div>
            </div>
          </div>

          <!-- Quick Info -->
          <div class="info-card">
            <h3>
              <i class="fas fa-lightbulb" style="color: var(--amber)"></i>
              <span x-text="t('quickInfo')"></span>
            </h3>
            <ul>
              <template
                x-for="(item, i) in translations[lang].quickInfoItems"
                :key="i"
              >
                <li><span x-html="item"></span></li>
              </template>
            </ul>
          </div>
        </div>
        <!-- ─── END LEFT ─── -->

        <!-- ──────────────── RIGHT COLUMN ──────────────── -->
        <div class="right-col">
          <!-- ── WARNINGS PANEL ── -->
          <div
            class="warnings-panel"
            x-show="res.totalPeak === 0 || hasSurgingLoads() || systemType === 'grid-tied' || systemType === 'hybrid'"
            x-transition
          >
            <!-- No load warning -->
            <div class="warn-item warn-info" x-show="res.totalPeak === 0">
              <i class="fas fa-circle-info"></i>
              <span x-text="t('warnNoLoad')"></span>
            </div>
            <!-- Motor surge warning -->
            <div class="warn-item warn-caution" x-show="hasSurgingLoads()">
              <i class="fas fa-triangle-exclamation"></i>
              <div>
                <strong x-text="t('warnSurge')"></strong>
                <span x-text="t('warnSurgeNote')"></span>
              </div>
            </div>
            <!-- Grid-Tied info -->
            <div
              class="warn-item warn-info"
              x-show="systemType === 'grid-tied'"
            >
              <i class="fas fa-plug-circle-check"></i>
              <span x-text="t('warnGridTiedBattery')"></span>
            </div>
            <!-- Hybrid info -->
            <div class="warn-item warn-info" x-show="systemType === 'hybrid'">
              <i class="fas fa-circle-half-stroke"></i>
              <span x-text="t('warnHybridBattery')"></span>
            </div>
          </div>

          <!-- Results Panel -->
          <div class="results-panel">
            <i class="fas fa-solar-panel results-bg-icon"></i>

            <div class="panel-title" x-text="t('systemSummary')"></div>

            <!-- Inverter -->
            <div class="result-item">
              <div>
                <div class="result-label" x-text="t('inverterSize')"></div>
                <div
                  class="result-value"
                  style="color: #60a5fa"
                  x-text="res.inverter + ' kW'"
                ></div>
              </div>
              <div class="result-icon ri-blue">
                <i class="fas fa-microchip"></i>
              </div>
            </div>

            <!-- Battery -->
            <div class="result-item">
              <div>
                <div class="result-label" x-text="t('storageNeeded')"></div>
                <div
                  class="result-value"
                  style="color: var(--purple)"
                  x-text="systemType === 'grid-tied' ? t('noBattery') : res.battery + ' kWh'"
                ></div>
                <div class="result-sub" x-show="systemType !== 'grid-tied'">
                  <strong x-text="res.battAh + ' Ah'"></strong>
                  @ <span x-text="voltage + 'V'"></span> &nbsp;·&nbsp;
                  <span x-text="res.battCount + ' ' + t('units')"></span>
                </div>
              </div>
              <div class="result-icon ri-purple">
                <i class="fas fa-car-battery"></i>
              </div>
            </div>

            <!-- Solar Array -->
            <div class="result-item" style="margin-bottom: 0">
              <div>
                <div class="result-label" x-text="t('solarArray')"></div>
                <div
                  class="result-value"
                  style="color: var(--orange)"
                  x-text="res.panels + ' kW'"
                ></div>
                <div class="result-sub">
                  <span
                    x-text="res.panelCount + ' ' + t('panelsEach') + ' (' + panelWatts + 'W each)'"
                  ></span>
                </div>
              </div>
              <div class="result-icon ri-orange">
                <i class="fas fa-sun"></i>
              </div>
            </div>

            <!-- Stats -->
            <div class="stats-row">
              <div class="stat-box">
                <div class="lbl" x-text="t('peakLoad')"></div>
                <div class="val">
                  <span x-text="res.totalPeak"></span>
                  <span
                    style="
                      font-size: 12px;
                      color: var(--text-dim);
                      font-weight: 500;
                    "
                    >W</span
                  >
                </div>
              </div>
              <div class="stat-box">
                <div class="lbl" x-text="t('dailyEnergy')"></div>
                <div class="val">
                  <span x-text="res.dailyEnergy"></span>
                  <span
                    style="
                      font-size: 12px;
                      color: var(--text-dim);
                      font-weight: 500;
                    "
                    >kWh</span
                  >
                </div>
              </div>
            </div>

            <!-- Cost Breakdown -->
            <div class="cost-header" x-text="t('costEstimate')"></div>
            <div class="cost-row">
              <span class="clbl">
                <span x-text="t('solarPanels')"></span>
                <span
                  style="color: var(--text-dim); font-size: 11px"
                  x-text="'(' + rates.solarPerW + ' ৳/W)'"
                >
                </span>
              </span>
              <span
                class="cval"
                style="color: var(--orange)"
                x-text="formatCost(cost.solar)"
              ></span>
            </div>
            <div class="cost-row" x-show="systemType !== 'grid-tied'">
              <span class="clbl">
                <span x-text="t('batteryBankCost')"></span>
                <span
                  style="color: var(--text-dim); font-size: 11px"
                  x-text="'(' + rates.battPerKwh.toLocaleString('en-IN') + ' ৳/kWh)'"
                >
                </span>
              </span>
              <span
                class="cval"
                style="color: var(--purple)"
                x-text="formatCost(cost.battery)"
              ></span>
            </div>
            <div class="cost-row">
              <span class="clbl">
                <span x-text="t('inverterAcc')"></span>
                <span
                  style="color: var(--text-dim); font-size: 11px"
                  x-text="'(' + rates.inverterPerKw.toLocaleString('en-IN') + ' ৳/kW)'"
                >
                </span>
              </span>
              <span
                class="cval"
                style="color: #60a5fa"
                x-text="formatCost(cost.inverter)"
              ></span>
            </div>
            <div class="cost-row" x-show="res.ccAmps > 0">
              <span class="clbl">
                <span x-text="t('chargeController')"></span>
                <span
                  style="color: var(--text-dim); font-size: 11px"
                  x-text="'(' + res.ccAmps + 'A · ' + res.ccCount + ' unit' + (res.ccCount > 1 ? 's' : '') + ')'"
                >
                </span>
              </span>
              <span
                class="cval"
                style="color: var(--green)"
                x-text="formatCost(cost.chargeController)"
              ></span>
            </div>
            <div class="total-cost-row">
              <span class="tlbl" x-text="t('totalEstCost')"></span>
              <span class="tval" x-text="formatCost(cost.total)"></span>
            </div>
            <div class="cost-approx-note">
              <i class="fas fa-circle-info"></i>
              <span x-text="t('approxNote')"></span>
            </div>

            <!-- Actions -->
            <div class="action-row">
              <button
                class="action-btn btn-save"
                @click="saveModalOpen = true; newConfigName = ''"
              >
                <i class="fas fa-save"></i> <span x-text="t('save')"></span>
              </button>
              <button
                class="action-btn btn-load"
                @click="loadModalOpen = true; refreshSavedConfigs()"
              >
                <i class="fas fa-history"></i> <span x-text="t('saved')"></span>
              </button>
              <button
                class="action-btn btn-share"
                @click="shareConfig()"
                :title="t('share')"
              >
                <i
                  class="fas"
                  :class="shareFeedback ? 'fa-check' : 'fa-link'"
                ></i>
                <span
                  x-text="shareFeedback ? t('shareCopied') : t('share')"
                ></span>
              </button>
              <button class="action-btn btn-reset" @click="resetSystem()">
                <i class="fas fa-undo"></i> <span x-text="t('reset')"></span>
              </button>
            </div>
          </div>
        </div>
        <!-- ─── END RIGHT ─── -->
      </div>
    </div>

    <!-- ── FOOTER ── -->
    <footer class="site-footer">
      <div class="footer-credit">
        Made with <span class="heart">&#10084;</span> by
        <a href="https://anwar.bd" target="_blank" rel="noopener"
          >Anwarul Islam</a
        >
      </div>
      <div class="footer-socials">
        <a
          href="https://github.com/anwarulislam"
          target="_blank"
          rel="noopener"
          class="social-link sl-github"
          title="GitHub"
        >
          <i class="fab fa-github"></i>
        </a>
        <a
          href="https://facebook.com/ismee.anwarulislam"
          target="_blank"
          rel="noopener"
          class="social-link sl-fb"
          title="Facebook"
        >
          <i class="fab fa-facebook-f"></i>
        </a>
        <a
          href="https://x.com/anwaarulislaam"
          target="_blank"
          rel="noopener"
          class="social-link sl-x"
          title="X (Twitter)"
        >
          <i class="fab fa-x-twitter"></i>
        </a>
        <a
          href="https://instagram.com/anwaarulislaam"
          target="_blank"
          rel="noopener"
          class="social-link sl-ig"
          title="Instagram"
        >
          <i class="fab fa-instagram"></i>
        </a>
      </div>
    </footer>

    <!-- ── SAVE MODAL ── -->
    <div class="modal-overlay" :class="{ 'active': saveModalOpen }" x-cloak>
      <div class="modal-box">
        <div class="modal-header">
          <h3 x-text="t('saveConfigTitle')"></h3>
          <button class="modal-close" @click="saveModalOpen = false">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="summary-preview">
            <strong x-text="t('saveSummaryTitle')"></strong><br />
            Inverter: <span x-text="res.inverter + ' kW'"></span> &nbsp;·&nbsp;
            Storage: <span x-text="res.battery + ' kWh'"></span> &nbsp;·&nbsp;
            Solar: <span x-text="res.panels + ' kW'"></span><br />
            Est. Cost:
            <span style="color: #60a5fa" x-text="formatCost(cost.total)"></span
            ><br /><br />
            <strong x-text="t('saveSummaryPrefs')"></strong><br />
            Sun: <span x-text="sun"></span>h &nbsp;|&nbsp; Autonomy:
            <span x-text="autonomy"></span>h &nbsp;|&nbsp; Efficiency:
            <span x-text="sysEfficiency"></span>% &nbsp;|&nbsp; Voltage:
            <span x-text="voltage"></span>V<br /><br />
            <strong x-text="t('saveSummaryActive')"></strong><br />
            <template x-if="getActiveAppliancesList().length === 0"
              ><span x-text="t('noneSelected')"></span
            ></template>
            <template x-for="line in getActiveAppliancesList()" :key="line">
              <div x-text="line"></div>
            </template>
          </div>
          <label class="input-label" x-text="t('configNameLabel')"></label>
          <input
            type="text"
            class="text-input"
            x-model="newConfigName"
            :placeholder="t('configNamePlaceholder')"
            @keydown.enter="saveConfiguration()"
          />
        </div>
        <div class="modal-footer">
          <button
            class="mb-cancel"
            @click="saveModalOpen = false"
            x-text="t('cancel')"
          ></button>
          <button class="mb-save" @click="saveConfiguration()">
            <i class="fas fa-save" style="margin-right: 6px"></i
            ><span x-text="t('saveSettingBtn')"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- ── LOAD MODAL ── -->
    <div class="modal-overlay" :class="{ 'active': loadModalOpen }" x-cloak>
      <div class="modal-box">
        <div class="modal-header">
          <h3 x-text="t('savedConfigsTitle')"></h3>
          <button class="modal-close" @click="loadModalOpen = false">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="configs-list">
            <template x-if="savedConfigs.length === 0">
              <div class="empty-state">
                <i
                  class="fas fa-folder-open"
                  style="
                    font-size: 28px;
                    margin-bottom: 8px;
                    display: block;
                    opacity: 0.3;
                  "
                ></i>
                <span x-text="t('noConfigs')"></span>
              </div>
            </template>
            <template x-for="c in savedConfigs" :key="c.id">
              <div class="config-item" @click="loadConfig(c)">
                <div>
                  <div class="config-name" x-text="c.name"></div>
                  <div class="config-meta">
                    <span x-text="c.date"></span> &nbsp;·&nbsp;
                    <span x-text="t('inv')"></span>:
                    <span x-text="c.summary.inverter"></span> &nbsp;·&nbsp;
                    <span x-text="t('pv')"></span>:
                    <span x-text="c.summary.pv"></span> &nbsp;·&nbsp;
                    <span x-text="c.summary.cost || 'N/A'"></span>
                  </div>
                </div>
                <div class="config-load-btn">
                  <i class="fas fa-download"></i>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
